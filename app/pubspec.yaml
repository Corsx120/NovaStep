name: task_manager
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  sqlite3: ^2.4.2
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.7+1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  path: ^1.9.0
  uuid: ^4.5.3
  window_manager: ^0.3.9
  file_picker: ^8.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

dependency_overrides:
  intl: ^0.20.2